# Deploy to EC2: develop → staging, main → production
#
# GitHub Secrets required:
#   Staging:  EC2_HOST_STAGING, EC2_SSH_PRIVATE_KEY_STAGING
#   Production: EC2_HOST, EC2_SSH_PRIVATE_KEY
#
# GitHub Environment variables/secrets (staging + production):
#   vars:  NODE_ENV, PORT, API_BASE_URL
#   secrets: DATABASE_URL, JWT_SECRET, JWT_EXPIRES_IN, CORS_ORIGIN,
#            SES_IAM_USER, SES_SMTP_USER, SES_SMTP_PASS, SES_SMTP_HOST,
#            SES_SMTP_PORT, EMAIL_FROM

name: Deploy to AWS

on:
  push:
    branches: [develop, main]

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    env:
      NODE_ENV: ${{ vars.NODE_ENV }}
      PORT: ${{ vars.PORT }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
      SES_IAM_USER: ${{ secrets.SES_IAM_USER }}
      SES_SMTP_USER: ${{ secrets.SES_SMTP_USER }}
      SES_SMTP_PASS: ${{ secrets.SES_SMTP_PASS }}
      SES_SMTP_HOST: ${{ secrets.SES_SMTP_HOST }}
      SES_SMTP_PORT: ${{ secrets.SES_SMTP_PORT }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY_STAGING }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST_STAGING }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Staging EC2
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::notice ::Deploy attempt $attempt/3..."
            ssh -i ~/.ssh/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=30 \
              -o ConnectTimeout=15 \
              ec2-user@${{ secrets.EC2_HOST_STAGING }} \
              NODE_ENV="${NODE_ENV}" \
              PORT="${PORT}" \
              API_BASE_URL="${API_BASE_URL}" \
              DATABASE_URL="${DATABASE_URL}" \
              JWT_SECRET="${JWT_SECRET}" \
              JWT_EXPIRES_IN="${JWT_EXPIRES_IN}" \
              CORS_ORIGIN="${CORS_ORIGIN}" \
              SES_IAM_USER="${SES_IAM_USER}" \
              SES_SMTP_USER="${SES_SMTP_USER}" \
              SES_SMTP_PASS="${SES_SMTP_PASS}" \
              SES_SMTP_HOST="${SES_SMTP_HOST}" \
              SES_SMTP_PORT="${SES_SMTP_PORT}" \
              EMAIL_FROM="${EMAIL_FROM}" \
              bash -s -- staging < scripts/gh-ec2-deploy.sh
            r=$?
            [ $r -eq 0 ] && exit 0
            [ $attempt -lt 3 ] && echo "::warning ::SSH failed (exit $r), retrying in 45s..." && sleep 45
          done
          exit 1

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      NODE_ENV: ${{ vars.NODE_ENV }}
      PORT: ${{ vars.PORT }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
      SES_IAM_USER: ${{ secrets.SES_IAM_USER }}
      SES_SMTP_USER: ${{ secrets.SES_SMTP_USER }}
      SES_SMTP_PASS: ${{ secrets.SES_SMTP_PASS }}
      SES_SMTP_HOST: ${{ secrets.SES_SMTP_HOST }}
      SES_SMTP_PORT: ${{ secrets.SES_SMTP_PORT }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Production EC2
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::notice ::Deploy attempt $attempt/3..."
            ssh -i ~/.ssh/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=30 \
              -o ConnectTimeout=15 \
              ec2-user@${{ secrets.EC2_HOST }} \
              NODE_ENV="${NODE_ENV}" \
              PORT="${PORT}" \
              API_BASE_URL="${API_BASE_URL}" \
              DATABASE_URL="${DATABASE_URL}" \
              JWT_SECRET="${JWT_SECRET}" \
              JWT_EXPIRES_IN="${JWT_EXPIRES_IN}" \
              CORS_ORIGIN="${CORS_ORIGIN}" \
              SES_IAM_USER="${SES_IAM_USER}" \
              SES_SMTP_USER="${SES_SMTP_USER}" \
              SES_SMTP_PASS="${SES_SMTP_PASS}" \
              SES_SMTP_HOST="${SES_SMTP_HOST}" \
              SES_SMTP_PORT="${SES_SMTP_PORT}" \
              EMAIL_FROM="${EMAIL_FROM}" \
              bash -s -- production < scripts/gh-ec2-deploy.sh
            r=$?
            [ $r -eq 0 ] && exit 0
            [ $attempt -lt 3 ] && echo "::warning ::SSH failed (exit $r), retrying in 45s..." && sleep 45
          done
          exit 1
